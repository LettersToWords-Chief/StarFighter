<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Fighter</title>
  <meta name="description" content="Star Fighter — A modern multiplayer space combat game inspired by Star Raiders" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 16:9 letterbox container -->
  <div id="game-wrapper">

    <!-- Galaxy Map Overlay (z-index 20, always on top until toggled off) -->
    <div id="galaxy-view">
      <canvas id="galaxy-canvas"></canvas>

      <!-- HUD overlay -->
      <div id="hud">
        <div id="hud-left"></div>

        <div id="hud-center">
          <div id="game-title">STAR FIGHTER</div>
          <div id="alert-box" class="hidden"></div>
        </div>

        <div id="hud-right">
          <div class="hud-panel">
            <div class="hud-label">SECTOR</div>
            <div class="hud-value" id="hud-sector">--</div>
          </div>
          <div class="hud-panel">
            <div class="hud-label">WARP COST</div>
            <div class="hud-value" id="hud-warp-cost">--</div>
          </div>
          <div class="hud-panel">
            <div class="hud-label">STATUS</div>
            <div class="hud-value" id="hud-status">STANDBY</div>
          </div>
          <div class="hud-panel" id="hud-resources">
            <div class="hud-label">RESOURCES</div>
            <div id="hud-resources-body" style="color:rgba(160,204,238,0.5);font-size:10px;font-family:var(--font-mono);line-height:1.7;">—</div>
          </div>
        </div>
      </div>

      <!-- Tooltip -->
      <div id="sector-tooltip" class="hidden"></div>

      <!-- Instructions -->
      <!-- Subspace Message Log — left side panel -->
      <div id="subspace-log"></div>

      <!-- Instructions -->
      <div id="instructions">
        <span>HOVER</span> sector info &nbsp;|&nbsp;
        <span>CLICK</span> select target &nbsp;|&nbsp;
        <span>H</span> warp &nbsp;|&nbsp;
        <span>ESC</span> cancel
      </div>
    </div>

    <!-- Sector / Combat View (runs underneath galaxy map overlay) -->
    <div id="combat-view">
      <canvas id="combat-canvas"></canvas>
      <div id="combat-hud">
        <button id="exit-combat">◀ GALAXY MAP</button>
      </div>

      <!-- Damage Report Overlay — opens on D (docking) or R (read-only) -->
      <div id="damage-report" style="display:none;">
        <div id="dr-panel">
          <div id="dr-header">
            <span id="dr-title">DAMAGE REPORT</span>
            <span id="dr-mode-badge">DOCK PENDING</span>
          </div>
          <div id="dr-content">
            <div id="dr-budget"></div>
            <div id="dr-rows"></div>
          </div>
          <div id="dr-footer">
            <span id="dr-hint">Check/uncheck repairs below. Apply at dock completion.</span>
            <button id="dr-close">CLOSE</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Warp tunnel overlay — full-screen, above sector, below galaxy map -->
    <div id="warp-view">
      <canvas id="warp-canvas"></canvas>
    </div>

  </div><!-- /#game-wrapper -->

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/GameConfig.js"></script>
  <script src="js/utils/HexMath.js"></script>
  <script src="js/galaxy/Starbase.js"></script>
  <script src="js/galaxy/CommerceLane.js"></script>
  <script src="js/galaxy/SupplyShip.js"></script>
  <script src="js/galaxy/ZylonBeacon.js"></script>
  <script src="js/galaxy/ZylonSeeker.js"></script>
  <script src="js/galaxy/ZylonWarrior.js"></script>
  <script src="js/galaxy/ZylonSpawner.js"></script>
  <script src="js/galaxy/GalaxyMap.js"></script>
  <script src="js/warp/WarpTunnel.js"></script>
  <script src="js/sector/ZylonShip.js"></script>
  <script src="js/sector/SectorView.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
